name: Build WireGuard APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '26.3.11579264'   # 对应 r26d

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache-dependency-path: app/src/main/go/go.sum   # 关键修改

    - name: Set Go proxy (for China network)
      run: go env -w GOPROXY=https://goproxy.cn,direct

    - name: Download Go dependencies
      run: cd app/src/main/go && go mod download

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-android-release
        path: app/build/outputs/apk/release/*.apk
